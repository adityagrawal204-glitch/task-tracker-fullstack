# --- Database setup (H2 in-memory) ---
# "in-memory" means the data lives only in RAM and resets every time you
# restart the app. Great for development - zero install, zero setup.
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Lets you open http://localhost:8080/h2-console in a browser to see your
# database tables and run SQL directly - very useful while learning.
spring.h2.console.enabled=true

# "update" tells Hibernate (the JPA implementation) to auto-create/update
# database tables based on your @Entity classes. Convenient for learning;
# in real production projects you'd typically use migration tools instead.
spring.jpa.hibernate.ddl-auto=update

# Prints the actual SQL Hibernate generates to your console - useful to see
# what's happening under the hood while you're learning.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Server port ---
server.port=8080
